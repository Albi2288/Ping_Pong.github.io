<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pong Bunt mit Burger Menü</title>
<style>
body{
  font-family:Arial;
  text-align:center;
  color:white;
  background:#111;
  margin:0;
  overflow-x:hidden;
}

canvas{
  margin-top:20px;
  border:2px solid white;
  touch-action:none;
}

/* Burger Menü Style */
.burger {
  position: fixed;
  top: 15px;
  left: 15px;
  cursor: pointer;
  z-index: 1000;
}

.burger div{
  width: 30px;
  height: 4px;
  background-color: white;
  margin: 5px 0;
  transition: 0.4s;
}

.menu {
  position: fixed;
  top:0;
  left:-250px;
  width: 250px;
  height: 100%;
  background:#222;
  padding: 60px 20px;
  transition: 0.4s;
  z-index: 999;
  text-align:left;
}

.menu.show {
  left:0;
}

.menu h2 { color:white; }
.menu select, .menu button { width: 100%; margin-bottom: 10px; padding:10px; font-size:16px; }
</style>
</head>
<body>

<!-- Burger Menü -->
<div class="burger" onclick="toggleMenu()">
  <div></div>
  <div></div>
  <div></div>
</div>

<div class="menu" id="menu">
  <h2>Pong Optionen</h2>
  <label>Modus:</label>
  <select id="mode">
    <option value="bot">Gegen Bot</option>
    <option value="two">2 Spieler</option>
  </select>
  <label>Schwierigkeit:</label>
  <select id="difficulty">
    <option value="2">Leicht</option>
    <option value="4">Mittel</option>
    <option value="6">Schwer</option>
  </select>
  <button onclick="startGame(); toggleMenu()">Start</button>
  <button onclick="showInstructions()">Anleitung</button>
</div>

<h1>Pong Bunt</h1>

<p id="timer">Zeit: 0</p>

<canvas id="game" width="800" height="400"></canvas>

<div id="leaderboard">
<h2>Bestenliste</h2>
<ol id="scores"></ol>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let paddleHeight = 80;
let paddleWidth = 10;
let player1 = {x:10,y:160,score:0};
let player2 = {x:780,y:160,score:0};
let ball = {x:400,y:200,vx:4,vy:4};
let timer=0, timerInterval;
let mode="bot", difficulty=4;
let hue=0; // für bunten Hintergrund

// Menü Funktionen
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}
function showInstructions(){
  alert("Spieler 1: Pfeiltasten ↑ ↓ oder Touch\nSpieler 2: W und S\nZiel: 10 Punkte erreichen");
}

// Spiel starten
function startGame(){
  mode=document.getElementById("mode").value;
  difficulty=parseInt(document.getElementById("difficulty").value);
  player1.score=0;
  player2.score=0;
  timer=0;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timer++;
    document.getElementById("timer").innerText="Zeit: "+timer;
  },1000);
  requestAnimationFrame(loop);
}

// Zeichnen
function draw(){
  // Bunter Hintergrund
  hue = (hue + 1) % 360;
  ctx.fillStyle = `hsl(${hue}, 70%, 20%)`;
  ctx.fillRect(0,0,800,400);

  // Paddles & Ball
  ctx.fillStyle="white";
  ctx.fillRect(player1.x,player1.y,paddleWidth,paddleHeight);
  ctx.fillRect(player2.x,player2.y,paddleWidth,paddleHeight);
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
  ctx.fill();

  // Punkte
  ctx.fillText(player1.score,350,30);
  ctx.fillText(player2.score,450,30);
}

// Ballbewegung
function moveBall(){
  ball.x+=ball.vx;
  ball.y+=ball.vy;
  if(ball.y<0||ball.y>400) ball.vy*=-1;
  if(ball.x<20 && ball.y>player1.y && ball.y<player1.y+paddleHeight) ball.vx*=-1;
  if(ball.x>780 && ball.y>player2.y && ball.y<player2.y+paddleHeight) ball.vx*=-1;
  if(ball.x<0){player2.score++; resetBall();}
  if(ball.x>800){player1.score++; resetBall();}
  if(player1.score>=10 || player2.score>=10) endGame();
}

function resetBall(){ ball.x=400; ball.y=200; ball.vx*=-1; }

function botMove(){
  let center=player2.y+paddleHeight/2;
  if(center<ball.y) player2.y+=difficulty;
  else player2.y-=difficulty;
}

function loop(){
  moveBall();
  if(mode==="bot") botMove();
  draw();
  requestAnimationFrame(loop);
}

// Steuerung
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowUp") player1.y-=20;
  if(e.key==="ArrowDown") player1.y+=20;
  if(e.key==="w") player2.y-=20;
  if(e.key==="s") player2.y+=20;
});
canvas.addEventListener("touchmove",(e)=>{
  let rect=canvas.getBoundingClientRect();
  let touch=e.touches[0].clientY-rect.top;
  player1.y=touch-paddleHeight/2;
});

function endGame(){
  clearInterval(timerInterval);
  alert("Spiel beendet! Punkte: Spieler1 "+player1.score+" | Spieler2 "+player2.score);
}
</script>
</body>
</html>
